<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Clock - Soft Pink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 600px;
            margin: 20px;
            border: 1px solid #ffc0d0;
        }
        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e8a2b9;
            margin-bottom: 40px;
        }
        .clock {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            background: #ffecf0;
            padding: 30px;
            border-radius: 48px;
            color: #c95a7c;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        .date {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #d46b8c;
        }
        .time {
            font-size: 2.5rem;
        }
        .footer {
            margin-top: 30px;
            color: #e8a2b9;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Real Time Clock </h1>
        <p class="subtitle">Tanggal, Jam, Menit, Detik</p>
        <div id="realTime" class="clock">
            <div class="date"></div>
            <div class="time"></div>
        </div>
        <div class="footer">Update setiap detik secara real time</div>
    </div>

    <script>
        function updateRealTime() {
            let now = new Date();
            
            let hari = now.toLocaleDateString("id-ID", { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            let jam = now.getHours().toString().padStart(2, '0');
            let menit = now.getMinutes().toString().padStart(2, '0');
            let detik = now.getSeconds().toString().padStart(2, '0');
            
            document.querySelector('.date').innerHTML = ` ${hari}`;
            document.querySelector('.time').innerHTML = ` ${jam}:${menit}:${detik}`;
        }
        
        setInterval(updateRealTime, 1000);
        updateRealTime();
    </script>
</body>
</html>
