<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Alert - Soft Pink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 500px;
            margin: 20px;
            border: 1px solid #ffc0d0;
        }
        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            color: #e8a2b9;
            margin-bottom: 30px;
        }
        button {
            background: #ffdfe8;
            border: 1px solid #ffc0d0;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #5e3a4b;
            transition: 0.2s;
        }
        button:hover {
            background: #ffc0d0;
            transform: scale(1.05);
        }
        .footer {
            margin-top: 30px;
            color: #d46b8c;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Program Alert </h1>
        <p class="subtitle">JavaScript Alert Box</p>
        <button onclick="tampilkanAlert()">Klik untuk Alert</button>
        <div class="footer">Praktikum 7 - Javascript</div>
    </div>

    <script>
        function tampilkanAlert() {
            alert(" Halo! Ini adalah alert dari program JavaScript \n\nSelamat belajar!");
        }
    </script>
</body>
</html>
