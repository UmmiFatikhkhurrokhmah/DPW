<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Password - Soft Pink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 500px;
            margin: 20px;
            border: 1px solid #ffc0d0;
        }
        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e8a2b9;
            margin-bottom: 30px;
        }
        input {
            background: white;
            border: 1px solid #ffc0d0;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            width: 80%;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus {
            border-color: #ff9eb6;
            box-shadow: 0 0 0 3px #ffb7c580;
        }
        button {
            background: #ffdfe8;
            border: 1px solid #ffc0d0;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #5e3a4b;
            transition: 0.2s;
        }
        button:hover {
            background: #ffc0d0;
            transform: scale(1.02);
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #fff8fa;
            border-radius: 24px;
            color: #b0577a;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Verifikasi Password </h1>
        <p class="subtitle">Pastikan password Anda cocok</p>
        <input type="password" id="password" placeholder="Masukkan password">
        <br>
        <input type="password" id="konfirmasiPassword" placeholder="Konfirmasi password">
        <br>
        <button onclick="verifikasiPassword()">Verifikasi</button>
        <div id="hasilVerifikasi" class="output"></div>
    </div>

    <script>
        function verifikasiPassword() {
            let pass = document.getElementById("password").value;
            let konfirm = document.getElementById("konfirmasiPassword").value;
            let hasil = document.getElementById("hasilVerifikasi");
            
            if (pass === "" || konfirm === "") {
                hasil.innerHTML = " Password dan konfirmasi tidak boleh kosong.";
            } else if (pass === konfirm) {
                hasil.innerHTML = " Password cocok! Akun Anda aman. ";
            } else {
                hasil.innerHTML = " Password tidak cocok. Silakan coba lagi.";
            }
        }
    </script>
</body>
</html>
