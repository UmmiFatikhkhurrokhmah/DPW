<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Radio Box - Soft Pink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 500px;
            margin: 20px;
            border: 1px solid #ffc0d0;
        }
        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e8a2b9;
            margin-bottom: 30px;
        }
        .radio-group {
            text-align: left;
            display: inline-block;
            margin-bottom: 20px;
        }
        .radio-group label {
            display: block;
            margin: 10px 0;
            color: #5e3a4b;
            cursor: pointer;
        }
        input[type="radio"] {
            margin-right: 10px;
            accent-color: #d46b8c;
        }
        button {
            background: #ffdfe8;
            border: 1px solid #ffc0d0;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #5e3a4b;
            transition: 0.2s;
        }
        button:hover {
            background: #ffc0d0;
            transform: scale(1.02);
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #fff8fa;
            border-radius: 24px;
            color: #b0577a;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1> Pilih Hobi </h1>
        <p class="subtitle">Program Radio Button</p>
        
        <div class="radio-group">
            <label><input type="radio" name="hobi" value="Membaca">  Membaca buku</label>
            <label><input type="radio" name="hobi" value="Menulis">  Menulis cerita</label>
            <label><input type="radio" name="hobi" value="Bernyanyi">  Bernyanyi</label>
            <label><input type="radio" name="hobi" value="Melukis">  Melukis</label>
        </div>
        <br>
        <button onclick="pilihRadio()">Pilih Hobi</button>
        <div id="hasilRadio" class="output"></div>
    </div>

    <script>
        function pilihRadio() {
            let pilihan = document.querySelector('input[name="hobi"]:checked');
            let hasil = document.getElementById("hasilRadio");
            if (pilihan) {
                hasil.innerHTML = ` Hobi yang Anda pilih: <strong>${pilihan.value}</strong> <br>Pilihan yang bagus!`;
            } else {
                hasil.innerHTML = " Silakan pilih salah satu hobi terlebih dahulu.";
            }
        }
    </script>
</body>
</html>
