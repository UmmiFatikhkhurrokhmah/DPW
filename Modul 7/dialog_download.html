<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Dialog dengan Progressbar - Soft Pink</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 550px;
            width: 100%;
            border: 1px solid #ffc0d0;
            transition: 0.3s;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.2);
        }

        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #e8a2b9;
            margin-bottom: 30px;
            font-style: italic;
        }

        .icon-download {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .file-info {
            background: #fff8fa;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            color: #5e3a4b;
        }

        .file-info p {
            margin: 8px 0;
        }

        .file-name {
            font-weight: bold;
            color: #d46b8c;
        }

        button {
            background: #ffdfe8;
            border: 1px solid #ffc0d0;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #5e3a4b;
            transition: 0.2s;
            margin: 10px 0;
        }

        button:hover {
            background: #ffc0d0;
            transform: scale(1.02);
        }

        .btn-download {
            background: #d46b8c;
            color: white;
            border: none;
        }

        .btn-download:hover {
            background: #c95a7c;
            transform: scale(1.02);
        }

        /* Custom Progressbar Style */
        #progressbar .ui-progressbar-value {
            background: #d46b8c !important;
            border-radius: 20px !important;
        }

        #progressbar {
            border-radius: 20px !important;
            background: #ffecf0 !important;
            border: 1px solid #ffc0d0 !important;
            height: 25px !important;
        }

        /* Dialog Custom Style */
        .ui-dialog .ui-dialog-titlebar {
            background: #ffd0dc !important;
            color: #a14262 !important;
            border: none !important;
            border-radius: 20px 20px 0 0 !important;
            font-weight: bold !important;
        }

        .ui-dialog {
            border-radius: 20px !important;
            border: 1px solid #ffc0d0 !important;
        }

        .ui-dialog .ui-dialog-content {
            background: white !important;
            border-radius: 0 0 20px 20px !important;
        }

        .progress-text {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #d46b8c;
        }

        .status-text {
            text-align: center;
            margin-top: 10px;
            color: #e8a2b9;
            font-size: 12px;
        }

        .footer {
            margin-top: 30px;
            color: #e8a2b9;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-download">
            ⬇️📁⬇️
        </div>
        <h1> Download Dialog </h1>
        <p class="subtitle">Dengan Progress Bar Real-time</p>

        <div class="file-info">
            <p> <span class="file-name">Praktikum_7_Modul_Javascript.pdf</span></p>
            <p> Ukuran: 2.5 MB</p>
            <p> Estimasi: 3 detik</p>
        </div>

        <button id="downloadBtn" class="btn-download">
             Mulai Download 
        </button>

        <div class="footer">
            Program 11 - Download Dialog dengan Progressbar
        </div>
    </div>

    <!-- Dialog Progress Download -->
    <div id="downloadDialog" title=" Mengunduh File" style="display: none;">
        <div style="padding: 10px 0;">
            <p style="margin-bottom: 15px; color: #5e3a4b;">
                 <strong>Praktikum_7_Modul_Javascript.pdf</strong>
            </p>
            <div id="progressbar"></div>
            <div id="progressText" class="progress-text">0%</div>
            <div id="statusMessage" class="status-text"> Memulai unduhan...</div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Inisialisasi dialog
            $("#downloadDialog").dialog({
                autoOpen: false,
                modal: true,
                width: 450,
                closeOnEscape: false,
                buttons: {
                    "Batal": function() {
                        if (confirm("Batalkan unduhan yang sedang berjalan?")) {
                            $(this).dialog("close");
                            resetProgress();
                        }
                    }
                }
            });

            let progressInterval = null;
            let currentProgress = 0;

            function resetProgress() {
                if (progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
                currentProgress = 0;
                $("#progressbar").progressbar("value", 0);
                $("#progressText").text("0%");
                $("#statusMessage").text("⏳ Memulai unduhan...").css("color", "#e8a2b9");
            }

            function startDownload() {
                // Reset progress terlebih dahulu
                resetProgress();
                
                // Buka dialog
                $("#downloadDialog").dialog("open");
                
                // Inisialisasi progressbar
                $("#progressbar").progressbar({
                    value: 0
                });
                
                currentProgress = 0;
                let speed = 10; // Setiap 300ms naik 10%
                
                progressInterval = setInterval(function() {
                    currentProgress += speed;
                    
                    if (currentProgress >= 100) {
                        currentProgress = 100;
                        $("#progressbar").progressbar("value", 100);
                        $("#progressText").text("100%");
                        $("#statusMessage").text(" Unduhan selesai! File berhasil di-download.").css("color", "#4caf50");
                        
                        clearInterval(progressInterval);
                        progressInterval = null;
                        
                        // Tutup dialog setelah 1.5 detik dan tampilkan notifikasi
                        setTimeout(function() {
                            $("#downloadDialog").dialog("close");
                            alert(" Unduhan Selesai!\n\nFile 'Praktikum_7_Modul_Javascript.pdf' telah berhasil di-download.\n\nTerima kasih telah menggunakan program ini! 💖");
                            resetProgress();
                        }, 1500);
                    } else {
                        $("#progressbar").progressbar("value", currentProgress);
                        $("#progressText").text(currentProgress + "%");
                        
                        // Update status message berdasarkan progres
                        if (currentProgress < 30) {
                            $("#statusMessage").text(" Menghubungi server...").css("color", "#e8a2b9");
                        } else if (currentProgress < 70) {
                            $("#statusMessage").text(" Mengunduh data...").css("color", "#d46b8c");
                        } else {
                            $("#statusMessage").text(" Menyimpan file...").css("color", "#d46b8c");
                        }
                    }
                }, 300);
            }

            // Event klik tombol download
            $("#downloadBtn").click(function() {
                startDownload();
            });
        });
    </script>
</body>
</html>
