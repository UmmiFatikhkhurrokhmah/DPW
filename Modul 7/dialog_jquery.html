<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Dialog jQuery - Soft Pink</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15);
            max-width: 500px;
            margin: 20px;
            border: 1px solid #ffc0d0;
        }
        h1 {
            color: #d46b8c;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e8a2b9;
            margin-bottom: 40px;
        }
        button {
            background: #ffdfe8;
            border: 1px solid #ffc0d0;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #5e3a4b;
            transition: 0.2s;
        }
        button:hover {
            background: #ffc0d0;
            transform: scale(1.05);
        }
