<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Soft Pink</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: Arial;
        }

        .wadah-flex {
            display: flex;
            background-color: #ffe4e1;
            padding: 10px;
            gap: 10px;
        }

        .item {
            background-color: #ffb6c1;
            padding: 20px;
            flex: 1;
            text-align: center;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>
<body>

<h2 style="color:#d63384;">Flexbox Sederhana</h2>

<div class="wadah-flex">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
</div>

<p>Kesimpulan: Flexbox memudahkan mengatur posisi elemen secara sejajar.</p>

</body>
</html>
