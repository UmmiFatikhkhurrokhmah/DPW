<!DOCTYPE html>
<html>

<head>
    <title>Layout Website Pink</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #fff0f5;
        }

        .container {
            display: grid;
            grid-template-areas:
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-columns: 1fr 3fr;
            gap: 10px;
            padding: 10px;
        }

        header {
            grid-area: header;
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
            color: white;
            border-radius: 10px;
        }

        aside {
            grid-area: sidebar;
            background-color: #ffc0cb;
            padding: 20px;
            border-radius: 10px;
        }

        main {
            grid-area: content;
            background-color: #ffe4e1;
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            grid-area: footer;
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
            color: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>Header </header>

        <aside>Sidebar Menu</aside>

        <main>Konten Utama</main>

        <footer>Footer</footer>

    </div>

</body>

</html>
