<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout 3</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: Arial;
        }

        .grid-container {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: #ffe4e1;
            padding: 10px;
        }

        .item {
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            color: white;
        }

        .item1 {
            grid-row: 1 / 3;
        }
    </style>
</head>
<body>

<h2 style="color:#d63384;">Grid Layout 3</h2>

<div class="grid-container">
    <div class="item item1">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
</div>

<p>Kesimpulan: grid-row membuat item memanjang ke bawah.</p>

</body>
</html>
