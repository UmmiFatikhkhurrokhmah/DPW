<!DOCTYPE html>
<html>
<head>
    <title>Grid Soft Pink</title>
    <style>
        body {
            background-color: #fff0f5;
            font-family: Arial;
        }

        .grid {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: #ffe4e1;
            padding: 10px;
        }

        .item {
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>
<body>

<h2 style="color:#d63384;">Grid Layout</h2>

<div class="grid">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
</div>

<p>Kesimpulan: Grid digunakan untuk membuat layout berbentuk baris dan kolom.</p>

</body>
</html>
