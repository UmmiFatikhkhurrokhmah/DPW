<html>
<head>
  <style>
    body { background-color: #fff0f5; font-family: Georgia, serif; padding: 30px; }
    h2 { color: #c25070; margin-bottom: 10px; }

    p.dotted  { border-style: dotted;  border-color: #e75480; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.dashed  { border-style: dashed;  border-color: #e75480; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.solid   { border-style: solid;   border-color: #e75480; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.double  { border-style: double;  border-color: #e75480; border-width: 4px; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.groove  { border-style: groove;  border-color: #c25070; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.ridge   { border-style: ridge;   border-color: #c25070; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.inset   { border-style: inset;   border-color: #c25070; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.outset  { border-style: outset;  border-color: #c25070; padding: 8px; margin-bottom: 6px; color: #7d2a42; }
    p.none    { border-style: none;    padding: 8px; margin-bottom: 6px; color: #7d2a42; background: #fde8ef; }

    span.dotted  { border-style: dotted;  border-color: #e75480; padding: 4px 8px; }
    span.outset  { border-style: outset;  border-color: #c25070; padding: 4px 8px; }

    .span-demo { margin-top: 10px; line-height: 2.5; }
  </style>
</head>
<body>
  <h2>Macam-macam style border pada paragraf</h2>
  <p class="dotted">A dotted border.</p>
  <p class="dashed">A dashed border.</p>
  <p class="solid">A solid border.</p>
  <p class="double">A double border.</p>
  <p class="groove">A groove border.</p>
  <p class="none">No border.</p>

  <h2>Macam-macam style border pada span</h2>
  <div class="span-demo">
    <span class="dotted">A dotted border (span).</span><br>
    <span class="outset">An outset border (span).</span>
  </div>
</body>
</html>
