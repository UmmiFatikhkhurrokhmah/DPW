<html>
<head>
  <style>
    body { background-color: #fff0f5; font-family: Georgia, serif; padding: 20px; }
    h2 { color: #c25070; margin-bottom: 10px; }
    div {
      border: 1px solid #e75480;
      margin: 0 auto;
      height: 100px;
      width: 500px;
      background: #fde8ef;
      color: #7d2a42;
      padding: 10px;
    }
    span {
      display: block;
      background: #f8b4c8;
      color: #7d2a42;
      padding: 6px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h2>Display Property</h2>
  <div>
    Ini adalah elemen pertama menggunakan DIV
    <div>
      Ini DIV di dalam DIV namun membuat elemen blok baru
      <span>Ini SPAN di dalam DIV tidak membuat elemen blok baru</span>
    </div>
  </div>
</body>
</html>
