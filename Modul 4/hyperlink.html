<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pengaturan pada link</title>
  <style type="text/css">
    body { background-color: #fff0f5; font-family: Georgia, serif; padding: 30px; }
    h2 { color: #c25070; margin-bottom: 16px; }

    a:link {
      text-decoration: none;
      background-color: #fde8ef;
      color: #c25070;
      padding: 6px 14px;
      border-radius: 20px;
    }
    a:active {
      text-decoration: none;
      color: #4a0020;
    }
    a:visited {
      text-decoration: none;
      color: #8b2252;
    }
    a:hover {
      font-weight: bold;
      text-transform: uppercase;
      text-decoration: underline overline;
      color: #ffffff;
      background-color: #e75480;
      padding: 6px 14px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <h2>Hyperlink dengan text-transform dan text-decoration</h2>
  <table border="0">
    <tr>
      <td><a href="#">Arahkan mouse ke sini</a></td>
    </tr>
    <tr>
      <td><a href="#">Arahkan mouse ke sini</a></td>
    </tr>
  </table>
</body>
</html>
